<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Cafe Management</title>
    <!-- Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        body {
            background-color: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 20px;
            color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2><i class="fa-solid fa-mug-hot"></i> Đăng nhập</h2>
        <form id="login-form">
            <div class="mb-3 text-start">
                <label for="username" class="form-label font-bold text-muted">Tên đăng nhập</label>
                <input type="text" class="form-control" id="username" placeholder="Nhập tên đăng nhập..." required>
            </div>
            <div class="mb-4 text-start">
                <label for="password" class="form-label font-bold text-muted">Mật khẩu</label>
                <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu..." required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">Đăng nhập</button>
            <div id="error-msg" class="text-danger mt-3" style="display: none;">Tài khoản hoặc mật khẩu không đúng!</div>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang đăng nhập...';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('cafe_token', data.token);
                    localStorage.setItem('cafe_role', data.role);
                    
                    if (data.role === 'admin') window.location.href = '/admin.html';
                    else if (data.role === 'kitchen') window.location.href = '/kitchen.html';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = "Lỗi kết nối đến máy chủ.";
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Đăng nhập';
            }
        });
    </script>
</body>
</html>
